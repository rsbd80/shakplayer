<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Player</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />
    <style>
        body { background: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #player { width: 100%; max-width: 800px; }
    </style>
</head>
<body>

<video id="player" controls crossorigin playsinline>
    <source type="application/vnd.apple.mpegurl" src="">
</video>

<script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>

<script>
    // URL থেকে url প্যারামিটারটি নেওয়া
    const urlParams = new URLSearchParams(window.location.search);
    const videoSrc = urlParams.get('url');
    
    const video = document.querySelector('video');
    const source = video.querySelector('source');
    
    if (videoSrc) {
        source.src = videoSrc;
    }

    document.addEventListener("DOMContentLoaded", () => {
        const player = new Plyr(video);
        if (Hls.isSupported() && videoSrc) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        }
    });
</script>

</body>
</html>
