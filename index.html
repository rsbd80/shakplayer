<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exo-Style Web Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        .video-js { width: 100vw; height: 100vh; }
        /* Center Crop Effect */
        .vjs-tech { object-fit: cover; }
    </style>
</head>
<body>

<video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" autoplay playsinline>
    <p class="vjs-no-js">আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।</p>
</video>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    // URL থেকে ভিডিও সোর্স পাওয়া
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('url');

    var player = videojs('my-video', {
        playbackRates: [0.5, 1, 1.5, 2],
        controlBar: {
            children: [
                'playToggle', 'volumePanel', 'currentTimeDisplay', 
                'progressControl', 'playbackRateMenuButton', 
                'fullscreenToggle'
            ]
        }
    });

    if (videoUrl) {
        player.src({ src: videoUrl, type: videoUrl.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4' });
    }
</script>
</body>
</html>
