<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Full Screen Video</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }
        
        /* প্লেয়ার এবং ভিডিওর সাইজ জোরপূর্বক পুরো স্ক্রিন করা */
        .plyr--video { 
            width: 100vw !important; 
            height: 100vh !important; 
        }
        
        video { 
            width: 100% !important; 
            height: 100% !important; 
            /* fill ব্যবহার করলে ভিডিও কোনো ফাঁকা জায়গা রাখবে না এবং টেনে স্ক্রিন পূর্ণ করবে */
            object-fit: fill !important; 
            background-color: #000;
        }
    </style>
</head>
<body>

<video id="player" autoplay playsinline muted controls>
    <source type="application/vnd.apple.mpegurl" src="">
</video>

<script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoSrc = urlParams.get('url');
    const video = document.getElementById('player');
    
    if (videoSrc) { video.querySelector('source').src = videoSrc; }

    document.addEventListener("DOMContentLoaded", () => {
        const player = new Plyr(video, {
            fullscreen: { enabled: true, fallback: true, iosNative: true }
        });

        if (Hls.isSupported() && videoSrc) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        }
    });
</script>
</body>
</html>
