<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RS Premium Live TV Player</title>
  
  <!-- Shaka Player UI CSS + JS (প্রিমিয়াম কন্ট্রোলবার) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; overflow: hidden; font-family: 'Roboto', sans-serif; }
    .shaka-video-container { width: 100% !important; height: 100% !important; }
    video { width: 100% !important; height: 100% !important; object-fit: contain; transition: object-fit 0.2s ease; }
    
    /* ফিট মোড স্টাইল */
    video.zoom-mode { object-fit: cover !important; }
    video.stretch-mode { object-fit: fill !important; }

    /* কাস্টম জুম ড্রপডাউন বাটন */
    .shaka-custom-zoom-btn {
      background: none; border: none; color: #ffffff; font-weight: bold;
      cursor: pointer; font-size: 13px; padding: 0 10px; height: 100%;
      display: flex; align-items: center; justify-content: center; text-transform: uppercase;
    }

    /* স্টাইলিশ ড্রপডাউন মেনু */
    .shaka-zoom-dropdown {
      position: absolute; bottom: 44px; background: rgba(20, 20, 20, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 6px; padding: 4px;
      display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 99999 !important;
    }
    .shaka-zoom-dropdown button {
      display: block; width: 120px; background: none; border: none; color: #e0e0e0;
      padding: 10px 12px; text-align: left; font-size: 13px; font-weight: 500;
      cursor: pointer; border-radius: 4px;
    }
    .shaka-zoom-dropdown button:hover, .shaka-zoom-dropdown button.active {
      background: #e50914; color: #ffffff;
    }
  </style>
</head>
<body>

<div class="shaka-video-container" data-shaka-player-container id="playerContainer">
  <video autoplay muted playsinline id="video"></video>
  <div class="shaka-zoom-dropdown" id="zoomDropdown">
    <button id="btn-orig" class="active">Original</button>
    <button id="btn-stretch">Stretch</button>
    <button id="btn-zoom">Fill (Zoom)</button>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) {
      console.warn("Browser not supported");
      return;
    }

    const video = document.getElementById("video");
    const container = document.getElementById("playerContainer");
    
    const player = new shaka.Player(video);
    const ui = new shaka.ui.Overlay(player, container, video);

    ui.configure({
      controlPanelElements: ['play_pause', 'mute', 'volume', 'spacer', 'quality', 'fullscreen']
    });

    player.configure({
      manifest: { retryParameters: { maxAttempts: 3, baseDelay: 1000 } }
    });

    // 🔁 কন্ট্রোল প্যানেল রেডি না হওয়া পর্যন্ত অপেক্ষা করে কাস্টম বাটন যোগ করা
    let zoomMenuBtn = null;
    const dropdown = document.getElementById('zoomDropdown');

    function insertZoomButton() {
      const controlPanel = container.querySelector('.shaka-control-panel');
      if (!controlPanel || controlPanel.querySelector('.shaka-custom-zoom-btn')) return false;
      
      zoomMenuBtn = document.createElement('button');
      zoomMenuBtn.classList.add('shaka-custom-zoom-btn', 'shaka-no-propagation');
      zoomMenuBtn.innerText = 'Original';
      
      const fullscreenBtn = controlPanel.querySelector('.shaka-fullscreen-button');
      if (fullscreenBtn) {
        controlPanel.insertBefore(zoomMenuBtn, fullscreenBtn);
      } else {
        controlPanel.appendChild(zoomMenuBtn);
      }
      
      // ড্রপডাউন টগল
      zoomMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const rect = zoomMenuBtn.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        dropdown.style.right = (containerRect.right - rect.right) + 'px';
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
      });
      return true;
    }

    // ৩ বার চেষ্টা (প্রথম ১০০মি.সে. পরে, সর্বোচ্চ ১ সেকেন্ড পর্যন্ত)
    let attempts = 0;
    function tryInsertButton() {
      if (insertZoomButton()) {
        console.log("✅ Custom zoom button added");
        return;
      }
      attempts++;
      if (attempts < 10) setTimeout(tryInsertButton, 100);
    }
    tryInsertButton();

    // ডকুমেন্ট ক্লিকে ড্রপডাউন বন্ধ
    document.addEventListener('click', () => { dropdown.style.display = 'none'; });

    // জুম মোড ফাংশন
    const btnOrig = document.getElementById('btn-orig');
    const btnStretch = document.getElementById('btn-stretch');
    const btnZoom = document.getElementById('btn-zoom');

    function setZoomMode(className, buttonText, activeBtn) {
      if (!zoomMenuBtn) return;
      video.className = className;
      zoomMenuBtn.innerText = buttonText;
      [btnOrig, btnStretch, btnZoom].forEach(btn => btn.classList.remove('active'));
      activeBtn.classList.add('active');
      dropdown.style.display = 'none';
    }

    btnOrig.addEventListener('click', () => setZoomMode('', 'Original', btnOrig));
    btnStretch.addEventListener('click', () => setZoomMode('stretch-mode', 'Stretch', btnStretch));
    btnZoom.addEventListener('click', () => setZoomMode('zoom-mode', 'Fill Zoom', btnZoom));

    // 📺 URL থেকে স্ট্রিম লোড
    const params = new URLSearchParams(window.location.search);
    const streamUrl = params.get("url");

    if (streamUrl) {
      const decodedUrl = decodeURIComponent(streamUrl).trim();
      try {
        await player.load(decodedUrl);
        setTimeout(() => { video.muted = false; }, 500);
      } catch (error) {
        console.error("Shaka load error, falling back to native video.src", error);
        // সরাসরি HTML5 ভিডিও এলিমেন্টে দেওয়া
        video.src = decodedUrl;
        video.muted = false;
        video.play().catch(e => console.log("Autoplay blocked:", e));
      }
    }
  });
</script>
</body>
</html>
