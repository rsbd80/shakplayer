<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JW Player</title>

  <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
  <script>
    // চাইলে নিজের JW key বসাতে পারো
    // jwplayer.key = "YOUR_JWPLAYER_KEY";
  </script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      font-family:Arial,sans-serif;
    }
    #player{
      width:100%;
      height:100vh;
      background:#000;
    }
    .loader{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      z-index:9999;
    }
    .spinner{
      width:48px;
      height:48px;
      border:4px solid rgba(255,255,255,.2);
      border-top:4px solid #fff;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .error-box{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      background:#000;
      color:#fff;
      text-align:center;
      padding:20px;
      z-index:10000;
    }
    .error-box h2{
      color:#ff4d4d;
      margin-bottom:10px;
      font-size:22px;
    }
    .error-box p{
      opacity:.9;
      max-width:700px;
      line-height:1.6;
      word-break:break-word;
    }
    .retry-btn{
      margin-top:15px;
      padding:10px 16px;
      border:none;
      border-radius:10px;
      background:#ff2d55;
      color:#fff;
      font-weight:600;
      cursor:pointer;
    }
  </style>
</head>
<body>

  <div id="player"></div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="error-box" id="errorBox">
    <h2>Stream Error</h2>
    <p id="errorText">No stream URL found.</p>
    <button class="retry-btn" onclick="location.reload()">Reload</button>
  </div>

  <script>
    function getParam(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    const loader = document.getElementById("loader");
    const errorBox = document.getElementById("errorBox");
    const errorText = document.getElementById("errorText");

    function showError(msg){
      loader.style.display = "none";
      errorText.textContent = msg;
      errorBox.style.display = "flex";
    }

    let streamUrl = getParam("url");

    if(!streamUrl){
      showError("Missing stream URL. Example: ?url=https://example.com/live.m3u8");
    } else {
      try { streamUrl = decodeURIComponent(streamUrl); } catch(e){}

      let type = "mp4";
      const u = streamUrl.toLowerCase();

      if (u.includes(".m3u8")) type = "hls";
      else if (u.includes(".mpd")) type = "dash";
      else if (u.includes(".mp4")) type = "mp4";

      const player = jwplayer("player");

      player.setup({
        file: streamUrl,
        type: type,
        width: "100%",
        height: "100%",
        autostart: true,
        mute: false,
        stretching: "uniform",
        preload: "auto",
        controls: true,
        cast: {},
        repeat: false
      });

      player.on("ready", function () {
        loader.style.display = "none";
      });

      player.on("firstFrame", function () {
        loader.style.display = "none";
      });

      player.on("play", function () {
        loader.style.display = "none";
      });

      player.on("buffer", function () {
        loader.style.display = "flex";
      });

      player.on("bufferChange", function(e){
        if(e.bufferPercent > 5){
          loader.style.display = "none";
        }
      });

      player.on("error", function (e) {
        showError("This stream could not be played.");
        console.log("JW Error:", e);
      });

      player.on("setupError", function (e) {
        showError("Player setup failed.");
        console.log("Setup Error:", e);
      });
    }
  </script>
</body>
</html>
