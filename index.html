<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RS Premium Player</title>

  <!-- HLS + DASH -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      width:100%;
      height:100%;
      background:#000;
      font-family:Arial,Helvetica,sans-serif;
      overflow:hidden;
      touch-action:manipulation;
    }

    .player-wrap{
      position:relative;
      width:100%;
      height:100vh;
      background:#000;
      overflow:hidden;
      user-select:none;
    }

    video{
      width:100%;
      height:100%;
      background:#000;
      object-fit:cover;
      display:block;
    }

    .poster{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:2;
      display:none;
      background:#000;
    }

    .watermark{
      position:absolute;
      top:62px;
      right:14px;
      max-width:95px;
      max-height:48px;
      z-index:16;
      opacity:.92;
      pointer-events:none;
      display:none;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,.45));
    }

    .top-bar{
      position:absolute;
      top:0;left:0;right:0;
      z-index:20;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 14px;
      background:linear-gradient(to bottom, rgba(0,0,0,.88), rgba(0,0,0,.35), rgba(0,0,0,0));
      transition:.25s;
    }

    .left-info{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .live-badge{
      background:#e50914;
      color:#fff;
      font-size:12px;
      font-weight:800;
      letter-spacing:.4px;
      padding:5px 9px;
      border-radius:999px;
      flex-shrink:0;
      box-shadow:0 6px 18px rgba(229,9,20,.28);
    }

    .title{
      color:#fff;
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:56vw;
      text-shadow:0 2px 10px rgba(0,0,0,.35);
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .icon-btn{
      width:38px;
      height:38px;
      border:none;
      outline:none;
      border-radius:50%;
      background:rgba(255,255,255,.14);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      cursor:pointer;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      transition:.2s;
    }
    .icon-btn:active{transform:scale(.95)}

    .center-ui{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:15;
      pointer-events:none;
    }

    .center-controls{
      display:flex;
      align-items:center;
      gap:14px;
      pointer-events:auto;
    }

    .center-btn{
      width:58px;
      height:58px;
      border:none;
      border-radius:50%;
      background:rgba(0,0,0,.45);
      color:#fff;
      font-size:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      backdrop-filter:blur(8px);
      transition:.2s;
      box-shadow:0 10px 30px rgba(0,0,0,.3);
    }
    .center-btn:active{transform:scale(.95)}

    .center-play{
      width:78px;
      height:78px;
      font-size:30px;
      background:rgba(0,0,0,.5);
    }

    .hidden{display:none !important;}

    .controls{
      position:absolute;
      left:0;right:0;bottom:0;
      z-index:20;
      padding:10px 12px 12px;
      background:linear-gradient(to top, rgba(0,0,0,.94), rgba(0,0,0,.42), rgba(0,0,0,0));
      transition:.25s;
    }

    .progress-wrap{
      width:100%;
      margin-bottom:10px;
    }

    input[type="range"]{
      -webkit-appearance:none;
      appearance:none;
      width:100%;
      height:4px;
      border-radius:999px;
      background:rgba(255,255,255,.25);
      outline:none;
      cursor:pointer;
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      width:14px;height:14px;
      border-radius:50%;
      background:#fff;
      cursor:pointer;
      margin-top:-5px;
      box-shadow:0 0 0 4px rgba(255,255,255,.12);
    }

    .controls-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .controls-left,.controls-right{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .control-btn{
      border:none;
      background:none;
      color:#fff;
      font-size:20px;
      cursor:pointer;
      width:34px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.15s;
    }
    .control-btn:active{transform:scale(.92)}

    .time{
      color:#fff;
      font-size:12px;
      min-width:92px;
      text-align:center;
      font-weight:600;
      opacity:.95;
    }

    .volume-wrap{
      display:flex;
      align-items:center;
      gap:6px;
    }
    .volume-slider{
      width:80px !important;
    }

    .speed-btn{
      min-width:48px;
      height:30px;
      padding:0 10px;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      color:#fff;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }

    .menu{
      position:absolute;
      right:12px;
      bottom:64px;
      z-index:22;
      min-width:140px;
      background:rgba(12,12,12,.95);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 12px 35px rgba(0,0,0,.45);
      display:none;
      backdrop-filter:blur(12px);
    }
    .menu.show{display:block;}
    .menu button{
      width:100%;
      border:none;
      background:transparent;
      color:#fff;
      padding:12px 14px;
      text-align:left;
      font-size:13px;
      cursor:pointer;
    }
    .menu button:hover,
    .menu button.active{
      background:rgba(255,255,255,.08);
    }

    .loader{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:30;
      background:rgba(0,0,0,.25);
      pointer-events:none;
      transition:.2s;
    }
    .loader.hidden{
      opacity:0;
      visibility:hidden;
    }
    .spinner{
      width:58px;
      height:58px;
      border:4px solid rgba(255,255,255,.22);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin .9s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .toast{
      position:absolute;
      left:50%;
      bottom:92px;
      transform:translateX(-50%);
      background:rgba(0,0,0,.72);
      color:#fff;
      padding:8px 14px;
      border-radius:999px;
      font-size:13px;
      z-index:26;
      opacity:0;
      pointer-events:none;
      transition:.2s;
      white-space:nowrap;
    }
    .toast.show{opacity:1}

    .error-box{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      padding:20px;
      z-index:40;
      background:#000;
      color:#fff;
    }
    .error-box.show{display:flex;}
    .error-box h2{
      font-size:18px;
      margin-bottom:8px;
    }
    .error-box p{
      font-size:13px;
      opacity:.85;
      max-width:500px;
      line-height:1.5;
    }
    .retry-btn{
      margin-top:14px;
      border:none;
      background:#e50914;
      color:#fff;
      font-weight:700;
      padding:10px 18px;
      border-radius:999px;
      cursor:pointer;
    }

    .hide-ui .top-bar,
    .hide-ui .controls,
    .hide-ui .watermark{
      opacity:0;
      pointer-events:none;
    }

    @media (max-width:768px){
      .title{max-width:44vw;font-size:13px}
      .icon-btn{width:34px;height:34px;font-size:16px}
      .control-btn{font-size:18px}
      .volume-wrap{display:none}
      .time{min-width:72px;font-size:11px}
      .center-btn{width:50px;height:50px;font-size:21px}
      .center-play{width:70px;height:70px;font-size:28px}
      .watermark{max-width:78px;max-height:38px;top:58px}
      .menu{right:10px;bottom:60px}
    }
  </style>
</head>
<body>
  <div class="player-wrap" id="playerWrap">
    <video id="video" playsinline webkit-playsinline preload="auto"></video>
    <img id="poster" class="poster" alt="poster">
    <img id="watermark" class="watermark" alt="logo">

    <div class="top-bar" id="topBar">
      <div class="left-info">
        <span class="live-badge">LIVE</span>
        <div class="title" id="channelTitle">RS Premium Player</div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="refreshBtn" title="Refresh">↻</button>
        <button class="icon-btn" id="fsBtnTop" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div class="center-ui">
      <div class="center-controls" id="centerControls">
        <button class="center-btn" id="rewindBtn">«10</button>
        <button class="center-btn center-play" id="centerPlay">▶</button>
        <button class="center-btn" id="forwardBtn">10»</button>
      </div>
    </div>

    <div class="controls" id="controls">
      <div class="progress-wrap">
        <input type="range" id="seekBar" min="0" max="100" value="0">
      </div>

      <div class="controls-row">
        <div class="controls-left">
          <button class="control-btn" id="playPauseBtn" title="Play/Pause">▶</button>
          <button class="control-btn" id="muteBtn" title="Mute">🔊</button>

          <div class="volume-wrap">
            <input class="volume-slider" type="range" id="volumeBar" min="0" max="1" step="0.01" value="1">
          </div>

          <div class="time" id="timeText">LIVE</div>
        </div>

        <div class="controls-right">
          <button class="speed-btn" id="speedBtn">1x</button>
          <button class="control-btn" id="reloadBtn" title="Reload">↻</button>
          <button class="control-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
        </div>
      </div>
    </div>

    <div class="menu" id="speedMenu">
      <button data-speed="0.5">0.5x</button>
      <button data-speed="0.75">0.75x</button>
      <button data-speed="1" class="active">1x</button>
      <button data-speed="1.25">1.25x</button>
      <button data-speed="1.5">1.5x</button>
      <button data-speed="2">2x</button>
    </div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="error-box" id="errorBox">
      <h2>Stream unavailable</h2>
      <p id="errorText">This stream could not be loaded. Please check the URL or try again.</p>
      <button class="retry-btn" id="retryBtn">Retry</button>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const playerWrap = document.getElementById('playerWrap');
    const loader = document.getElementById('loader');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const channelTitle = document.getElementById('channelTitle');
    const poster = document.getElementById('poster');
    const watermark = document.getElementById('watermark');
    const toast = document.getElementById('toast');

    const centerPlay = document.getElementById('centerPlay');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const volumeBar = document.getElementById('volumeBar');
    const seekBar = document.getElementById('seekBar');
    const timeText = document.getElementById('timeText');
    const refreshBtn = document.getElementById('refreshBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const retryBtn = document.getElementById('retryBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const fsBtnTop = document.getElementById('fsBtnTop');
    const rewindBtn = document.getElementById('rewindBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const speedBtn = document.getElementById('speedBtn');
    const speedMenu = document.getElementById('speedMenu');

    let hls = null;
    let dashPlayer = null;
    let hideTimer = null;
    let toastTimer = null;

    const params = new URLSearchParams(window.location.search);
    const streamUrl = params.get('url') || '';
    const title = params.get('title') || 'RS Premium Player';
    const posterUrl = params.get('poster') || '';
    const logoUrl = params.get('logo') || '';

    channelTitle.textContent = decodeURIComponent(title);

    if (posterUrl) {
      poster.src = decodeURIComponent(posterUrl);
      poster.style.display = 'block';
    }

    if (logoUrl) {
      watermark.src = decodeURIComponent(logoUrl);
      watermark.style.display = 'block';
    }

    function showToast(text){
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1200);
    }

    function showLoader(show = true){
      loader.classList.toggle('hidden', !show);
    }

    function showError(msg = 'Failed to load stream'){
      showLoader(false);
      errorText.textContent = msg;
      errorBox.classList.add('show');
      centerPlay.textContent = '▶';
    }

    function hideError(){
      errorBox.classList.remove('show');
    }

    function destroyPlayers(){
      if(hls){
        hls.destroy();
        hls = null;
      }
      if(dashPlayer){
        dashPlayer.reset();
        dashPlayer = null;
      }
      video.removeAttribute('src');
      video.load();
    }

    function isLiveLike(url){
      return /\.m3u8(\?.*)?$/i.test(url) || /\.mpd(\?.*)?$/i.test(url);
    }

    function formatTime(sec){
      if(!isFinite(sec)) return 'LIVE';
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      if(h > 0){
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      }
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updatePlayUI(){
      const paused = video.paused;
      playPauseBtn.textContent = paused ? '▶' : '❚❚';
      centerPlay.textContent = paused ? '▶' : '❚❚';
    }

    function updateMuteUI(){
      muteBtn.textContent = video.muted || video.volume === 0 ? '🔇' : '🔊';
      volumeBar.value = video.muted ? 0 : video.volume;
    }

    function updateTimeUI(){
      const live = isLiveLike(streamUrl) && (!isFinite(video.duration) || video.duration === Infinity);
      if(live){
        timeText.textContent = 'LIVE';
        seekBar.value = 100;
        seekBar.disabled = true;
        return;
      }

      seekBar.disabled = false;
      const current = video.currentTime || 0;
      const duration = video.duration || 0;
      timeText.textContent = `${formatTime(current)} / ${formatTime(duration)}`;

      if(duration > 0){
        seekBar.value = (current / duration) * 100;
      }
    }

    async function playVideo(){
      try{
        await video.play();
      }catch(e){}
      updatePlayUI();
    }

    function pauseVideo(){
      video.pause();
      updatePlayUI();
    }

    function togglePlay(){
      if(video.paused) playVideo();
      else pauseVideo();
    }

    function enterFullscreen(){
      if(document.fullscreenElement){
        document.exitFullscreen?.();
      }else{
        playerWrap.requestFullscreen?.();
      }
    }

    function resetIdleTimer(){
      playerWrap.classList.remove('hide-ui');
      clearTimeout(hideTimer);
      if(!video.paused){
        hideTimer = setTimeout(() => {
          playerWrap.classList.add('hide-ui');
          speedMenu.classList.remove('show');
        }, 2500);
      }
    }

    function attachCommonEvents(){
      video.addEventListener('loadedmetadata', () => {
        showLoader(false);
        hideError();
        updateTimeUI();
      });

      video.addEventListener('canplay', () => {
        showLoader(false);
      });

      video.addEventListener('waiting', () => showLoader(true));

      video.addEventListener('playing', () => {
        showLoader(false);
        poster.style.display = 'none';
        updatePlayUI();
        resetIdleTimer();
      });

      video.addEventListener('pause', () => {
        updatePlayUI();
        playerWrap.classList.remove('hide-ui');
      });

      video.addEventListener('timeupdate', updateTimeUI);
      video.addEventListener('durationchange', updateTimeUI);
      video.addEventListener('volumechange', updateMuteUI);

      video.addEventListener('error', () => {
        showError('ভিডিও চালানো যাচ্ছে না। Stream URL চেক করুন বা আবার চেষ্টা করুন।');
      });
    }

    function loadStream(url){
      if(!url){
        showError('No stream URL found. Use ?url=YOUR_STREAM_URL');
        return;
      }

      destroyPlayers();
      hideError();
      showLoader(true);

      if (posterUrl) poster.style.display = 'block';

      const cleanUrl = decodeURIComponent(url);

      if(/\.m3u8(\?.*)?$/i.test(cleanUrl)){
        if(Hls.isSupported()){
          hls = new Hls({
            enableWorker:true,
            lowLatencyMode:true
          });
          hls.loadSource(cleanUrl);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            playVideo();
          });

          hls.on(Hls.Events.ERROR, function(event, data){
            if(data?.fatal){
              showError('HLS stream load failed.');
            }
          });

        }else if(video.canPlayType('application/vnd.apple.mpegurl')){
          video.src = cleanUrl;
          playVideo();
        }else{
          showError('Your browser does not support HLS playback.');
        }
      }
      else if(/\.mpd(\?.*)?$/i.test(cleanUrl)){
        try{
          dashPlayer = dashjs.MediaPlayer().create();
          dashPlayer.initialize(video, cleanUrl, true);
          dashPlayer.on('error', () => {
            showError('DASH stream load failed.');
          });
        }catch(err){
          showError('Failed to initialize DASH player.');
        }
      }
      else{
        video.src = cleanUrl;
        playVideo();
      }
    }

    function seekBy(seconds){
      if(!isFinite(video.duration) || video.duration === Infinity) return;
      video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
      showToast(seconds > 0 ? `+${seconds}s` : `${seconds}s`);
    }

    playPauseBtn.addEventListener('click', togglePlay);
    centerPlay.addEventListener('click', togglePlay);

    rewindBtn.addEventListener('click', () => seekBy(-10));
    forwardBtn.addEventListener('click', () => seekBy(10));

    muteBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      updateMuteUI();
    });

    volumeBar.addEventListener('input', () => {
      video.volume = parseFloat(volumeBar.value);
      video.muted = video.volume === 0;
      updateMuteUI();
    });

    seekBar.addEventListener('input', () => {
      if(isFinite(video.duration) && video.duration > 0){
        video.currentTime = (seekBar.value / 100) * video.duration;
      }
    });

    refreshBtn.addEventListener('click', () => loadStream(streamUrl));
    reloadBtn.addEventListener('click', () => loadStream(streamUrl));
    retryBtn.addEventListener('click', () => loadStream(streamUrl));

    fullscreenBtn.addEventListener('click', enterFullscreen);
    fsBtnTop.addEventListener('click', enterFullscreen);

    speedBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      speedMenu.classList.toggle('show');
    });

    speedMenu.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        const speed = parseFloat(btn.dataset.speed);
        video.playbackRate = speed;
        speedBtn.textContent = speed + 'x';
        speedMenu.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        speedMenu.classList.remove('show');
        showToast(`Speed ${speed}x`);
      });
    });

    document.addEventListener('click', (e) => {
      if(!speedMenu.contains(e.target) && e.target !== speedBtn){
        speedMenu.classList.remove('show');
      }
    });

    ['mousemove','touchstart','click'].forEach(evt => {
      playerWrap.addEventListener(evt, resetIdleTimer, {passive:true});
    });

    video.addEventListener('dblclick', enterFullscreen);

    video.addEventListener('click', () => {
      resetIdleTimer();
    });

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if(e.code === 'Space'){
        e.preventDefault();
        togglePlay();
      }else if(key === 'f'){
        enterFullscreen();
      }else if(key === 'm'){
        video.muted = !video.muted;
        updateMuteUI();
      }else if(key === 'arrowleft'){
        seekBy(-10);
      }else if(key === 'arrowright'){
        seekBy(10);
      }
    });

    attachCommonEvents();
    updatePlayUI();
    updateMuteUI();
    loadStream(streamUrl);
    resetIdleTimer();
  </script>
</body>
</html>
