<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RS Player</title>

  <!-- HLS + DASH -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      width:100%;
      height:100%;
      background:#000;
      font-family:Arial,Helvetica,sans-serif;
      overflow:hidden;
    }

    .player-wrap{
      position:relative;
      width:100%;
      height:100vh;
      background:#000;
      overflow:hidden;
    }

    video{
      width:100%;
      height:100%;
      background:#000;
      object-fit:cover; /* পুরো স্ক্রিন ভর্তি */
      display:block;
    }

    /* top bar */
    .top-bar{
      position:absolute;
      top:0;left:0;right:0;
      z-index:20;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 14px;
      background:linear-gradient(to bottom, rgba(0,0,0,.8), rgba(0,0,0,0));
      transition:.25s;
    }

    .left-info{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .live-badge{
      background:#e50914;
      color:#fff;
      font-size:12px;
      font-weight:700;
      padding:4px 8px;
      border-radius:999px;
      flex-shrink:0;
    }

    .title{
      color:#fff;
      font-size:14px;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:55vw;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .icon-btn{
      width:38px;
      height:38px;
      border:none;
      outline:none;
      border-radius:50%;
      background:rgba(255,255,255,.14);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      cursor:pointer;
      backdrop-filter:blur(6px);
    }

    /* center big play */
    .center-play{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:78px;
      height:78px;
      border-radius:50%;
      border:none;
      background:rgba(0,0,0,.45);
      color:#fff;
      font-size:30px;
      z-index:15;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.2s;
      backdrop-filter:blur(6px);
    }

    .center-play.hidden{display:none;}

    /* bottom controls */
    .controls{
      position:absolute;
      left:0;right:0;bottom:0;
      z-index:20;
      padding:10px 12px 12px;
      background:linear-gradient(to top, rgba(0,0,0,.9), rgba(0,0,0,0));
      transition:.25s;
    }

    .progress-wrap{
      width:100%;
      margin-bottom:8px;
    }

    input[type="range"]{
      -webkit-appearance:none;
      appearance:none;
      width:100%;
      height:4px;
      border-radius:999px;
      background:rgba(255,255,255,.25);
      outline:none;
      cursor:pointer;
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      width:14px;height:14px;
      border-radius:50%;
      background:#fff;
      cursor:pointer;
      margin-top:-5px;
    }

    .controls-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .controls-left,.controls-right{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .control-btn{
      border:none;
      background:none;
      color:#fff;
      font-size:20px;
      cursor:pointer;
      width:34px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .time{
      color:#fff;
      font-size:12px;
      min-width:82px;
      text-align:center;
    }

    .volume-wrap{
      display:flex;
      align-items:center;
      gap:6px;
    }

    .volume-slider{
      width:80px !important;
    }

    /* loading */
    .loader{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:30;
      background:rgba(0,0,0,.25);
      pointer-events:none;
      transition:.2s;
    }

    .loader.hidden{
      opacity:0;
      visibility:hidden;
    }

    .spinner{
      width:56px;
      height:56px;
      border:4px solid rgba(255,255,255,.22);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin .9s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    /* error */
    .error-box{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      padding:20px;
      z-index:40;
      background:#000;
      color:#fff;
    }

    .error-box.show{display:flex;}

    .error-box h2{
      font-size:18px;
      margin-bottom:8px;
    }

    .error-box p{
      font-size:13px;
      opacity:.85;
      max-width:500px;
      line-height:1.5;
    }

    .retry-btn{
      margin-top:14px;
      border:none;
      background:#e50914;
      color:#fff;
      font-weight:700;
      padding:10px 18px;
      border-radius:999px;
      cursor:pointer;
    }

    /* hide controls when idle */
    .hide-ui .top-bar,
    .hide-ui .controls{
      opacity:0;
      pointer-events:none;
    }

    /* mobile */
    @media (max-width:768px){
      .title{max-width:42vw;font-size:13px}
      .icon-btn{width:34px;height:34px;font-size:16px}
      .control-btn{font-size:18px}
      .volume-wrap{display:none;}
      .time{min-width:68px;font-size:11px}
      .center-play{width:70px;height:70px;font-size:28px}
    }
  </style>
</head>
<body>
  <div class="player-wrap" id="playerWrap">
    <video id="video" playsinline webkit-playsinline preload="auto"></video>

    <!-- Top -->
    <div class="top-bar" id="topBar">
      <div class="left-info">
        <span class="live-badge">LIVE</span>
        <div class="title" id="channelTitle">RS Player</div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="refreshBtn" title="Refresh">↻</button>
        <button class="icon-btn" id="fsBtnTop" title="Fullscreen">⛶</button>
      </div>
    </div>

    <!-- Center Play -->
    <button class="center-play" id="centerPlay">▶</button>

    <!-- Bottom controls -->
    <div class="controls" id="controls">
      <div class="progress-wrap">
        <input type="range" id="seekBar" min="0" max="100" value="0">
      </div>

      <div class="controls-row">
        <div class="controls-left">
          <button class="control-btn" id="playPauseBtn" title="Play/Pause">▶</button>
          <button class="control-btn" id="muteBtn" title="Mute">🔊</button>
          <div class="volume-wrap">
            <input class="volume-slider" type="range" id="volumeBar" min="0" max="1" step="0.01" value="1">
          </div>
          <div class="time" id="timeText">LIVE</div>
        </div>

        <div class="controls-right">
          <button class="control-btn" id="reloadBtn" title="Reload">↻</button>
          <button class="control-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
        </div>
      </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
      <div class="spinner"></div>
    </div>

    <!-- Error -->
    <div class="error-box" id="errorBox">
      <h2>Stream unavailable</h2>
      <p id="errorText">This stream could not be loaded. Please check the URL or try again.</p>
      <button class="retry-btn" id="retryBtn">Retry</button>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const playerWrap = document.getElementById('playerWrap');
    const loader = document.getElementById('loader');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');

    const channelTitle = document.getElementById('channelTitle');
    const centerPlay = document.getElementById('centerPlay');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const volumeBar = document.getElementById('volumeBar');
    const seekBar = document.getElementById('seekBar');
    const timeText = document.getElementById('timeText');
    const refreshBtn = document.getElementById('refreshBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const retryBtn = document.getElementById('retryBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const fsBtnTop = document.getElementById('fsBtnTop');

    let hls = null;
    let dashPlayer = null;
    let hideTimer = null;

    // Query params
    const params = new URLSearchParams(window.location.search);
    const streamUrl = params.get('url') || '';
    const title = params.get('title') || 'RS Player';

    channelTitle.textContent = decodeURIComponent(title);

    function showLoader(show = true){
      loader.classList.toggle('hidden', !show);
    }

    function showError(msg = 'Failed to load stream'){
      showLoader(false);
      errorText.textContent = msg;
      errorBox.classList.add('show');
      centerPlay.classList.add('hidden');
    }

    function hideError(){
      errorBox.classList.remove('show');
    }

    function destroyPlayers(){
      if(hls){
        hls.destroy();
        hls = null;
      }
      if(dashPlayer){
        dashPlayer.reset();
        dashPlayer = null;
      }
      video.removeAttribute('src');
      video.load();
    }

    function isLiveLike(url){
      return /\.m3u8(\?.*)?$/i.test(url) || /\.mpd(\?.*)?$/i.test(url);
    }

    function formatTime(sec){
      if(!isFinite(sec)) return 'LIVE';
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      if(h > 0){
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      }
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function updatePlayUI(){
      const isPaused = video.paused;
      playPauseBtn.textContent = isPaused ? '▶' : '❚❚';
      centerPlay.textContent = isPaused ? '▶' : '❚❚';
      centerPlay.classList.toggle('hidden', !isPaused);
    }

    function updateMuteUI(){
      muteBtn.textContent = video.muted || video.volume === 0 ? '🔇' : '🔊';
    }

    function updateTimeUI(){
      const live = isLiveLike(streamUrl) && (!isFinite(video.duration) || video.duration === Infinity);
      if(live){
        timeText.textContent = 'LIVE';
        seekBar.value = 100;
        return;
      }

      const current = video.currentTime || 0;
      const duration = video.duration || 0;
      timeText.textContent = `${formatTime(current)} / ${formatTime(duration)}`;

      if(duration > 0){
        seekBar.value = (current / duration) * 100;
      }
    }

    async function playVideo(){
      try{
        await video.play();
      }catch(e){
        // autoplay blocked
      }
      updatePlayUI();
    }

    function pauseVideo(){
      video.pause();
      updatePlayUI();
    }

    function togglePlay(){
      if(video.paused) playVideo();
      else pauseVideo();
    }

    function enterFullscreen(){
      const el = playerWrap;
      if(document.fullscreenElement){
        document.exitFullscreen?.();
      }else{
        el.requestFullscreen?.();
      }
    }

    function resetIdleTimer(){
      playerWrap.classList.remove('hide-ui');
      clearTimeout(hideTimer);
      if(!video.paused){
        hideTimer = setTimeout(() => {
          playerWrap.classList.add('hide-ui');
        }, 2500);
      }
    }

    function attachCommonEvents(){
      video.addEventListener('loadedmetadata', () => {
        showLoader(false);
        hideError();
        updateTimeUI();
      });

      video.addEventListener('canplay', () => {
        showLoader(false);
      });

      video.addEventListener('waiting', () => showLoader(true));
      video.addEventListener('playing', () => {
        showLoader(false);
        updatePlayUI();
        resetIdleTimer();
      });

      video.addEventListener('pause', () => {
        updatePlayUI();
        playerWrap.classList.remove('hide-ui');
      });

      video.addEventListener('timeupdate', updateTimeUI);
      video.addEventListener('durationchange', updateTimeUI);
      video.addEventListener('volumechange', updateMuteUI);

      video.addEventListener('error', () => {
        showError('ভিডিও চালানো যাচ্ছে না। Stream URL চেক করুন বা আবার চেষ্টা করুন।');
      });
    }

    function loadStream(url){
      if(!url){
        showError('No stream URL found. Use ?url=YOUR_STREAM_URL');
        return;
      }

      destroyPlayers();
      hideError();
      showLoader(true);

      const cleanUrl = decodeURIComponent(url);

      if(/\.m3u8(\?.*)?$/i.test(cleanUrl)){
        if(Hls.isSupported()){
          hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
          });
          hls.loadSource(cleanUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            playVideo();
          });
          hls.on(Hls.Events.ERROR, function(event, data){
            if(data?.fatal){
              showError('HLS stream load failed.');
            }
          });
        }else if(video.canPlayType('application/vnd.apple.mpegurl')){
          video.src = cleanUrl;
          playVideo();
        }else{
          showError('Your browser does not support HLS playback.');
        }
      }
      else if(/\.mpd(\?.*)?$/i.test(cleanUrl)){
        try{
          dashPlayer = dashjs.MediaPlayer().create();
          dashPlayer.initialize(video, cleanUrl, true);
          dashPlayer.on('error', () => {
            showError('DASH stream load failed.');
          });
        }catch(err){
          showError('Failed to initialize DASH player.');
        }
      }
      else{
        video.src = cleanUrl;
        playVideo();
      }
    }

    // controls
    playPauseBtn.addEventListener('click', togglePlay);
    centerPlay.addEventListener('click', togglePlay);

    muteBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      updateMuteUI();
    });

    volumeBar.addEventListener('input', () => {
      video.volume = parseFloat(volumeBar.value);
      video.muted = video.volume === 0;
      updateMuteUI();
    });

    seekBar.addEventListener('input', () => {
      if(isFinite(video.duration) && video.duration > 0){
        video.currentTime = (seekBar.value / 100) * video.duration;
      }
    });

    refreshBtn.addEventListener('click', () => loadStream(streamUrl));
    reloadBtn.addEventListener('click', () => loadStream(streamUrl));
    retryBtn.addEventListener('click', () => loadStream(streamUrl));

    fullscreenBtn.addEventListener('click', enterFullscreen);
    fsBtnTop.addEventListener('click', enterFullscreen);

    // show controls on interaction
    ['mousemove','touchstart','click'].forEach(evt => {
      playerWrap.addEventListener(evt, resetIdleTimer, {passive:true});
    });

    // double click fullscreen
    video.addEventListener('dblclick', enterFullscreen);
    video.addEventListener('click', () => {
      resetIdleTimer();
    });

    // keyboard support
    document.addEventListener('keydown', (e) => {
      if(e.code === 'Space'){
        e.preventDefault();
        togglePlay();
      }else if(e.key.toLowerCase() === 'f'){
        enterFullscreen();
      }else if(e.key.toLowerCase() === 'm'){
        video.muted = !video.muted;
        updateMuteUI();
      }
    });

    attachCommonEvents();
    updatePlayUI();
    updateMuteUI();
    loadStream(streamUrl);
    resetIdleTimer();
  </script>
</body>
</html>
